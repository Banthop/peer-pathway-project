<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn Post Image - EarlyEdge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .card {
    width: 1080px;
    height: 1080px;
    background: #0A0A0A;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 54px 54px;
    z-index: 0;
  }

  /* REJECTED */
  .rejected-section {
    position: relative;
    z-index: 1;
    padding: 40px 44px 28px;
  }
  .rejected-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #EF4444;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rejected-label::before {
    content: '';
    width: 7px;
    height: 7px;
    background: #EF4444;
    border-radius: 50%;
  }
  .logos-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }
  .logo-item {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    padding: 0 12px;
  }
  .logo-item img {
    height: 32px;
    max-width: 100%;
    object-fit: contain;
  }
  .logo-item::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 4px;
    right: 4px;
    height: 2px;
    background: #EF4444;
    opacity: 0.45;
    transform: rotate(-8deg);
  }

  /* DIVIDER */
  .divider {
    margin: 0 44px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    position: relative;
    z-index: 1;
  }

  /* PIVOT */
  .pivot-section {
    position: relative;
    z-index: 1;
    padding: 24px 44px 12px;
  }
  .pivot-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #4ADE80;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pivot-label::before {
    content: '';
    width: 7px;
    height: 7px;
    background: #4ADE80;
    border-radius: 50%;
  }

  /* STATS */
  .stats-section {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 44px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px 48px;
    margin-bottom: 28px;
  }
  .stat-number {
    font-size: 68px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1;
    letter-spacing: -3px;
  }
  .stat-number.green { color: #4ADE80; }
  .stat-label {
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    margin-top: 6px;
  }
  .tagline {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    line-height: 1.5;
  }
  .tagline strong { color: #FFFFFF; font-weight: 600; }

  /* BOTTOM */
  .bottom-bar {
    position: relative;
    z-index: 1;
    padding: 24px 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .brand-text {
    font-size: 22px;
    color: #FFFFFF;
  }
  .brand-text span:first-child { font-weight: 300; }
  .brand-text span:last-child { font-weight: 700; }
  .bottom-cta {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }
</style>
</head>
